<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepsis ER MPH</title>
    <!-- ใช้ Tailwind CSS ตกแต่งแนว Medical UI อ่านง่าย คัดกรองไว -->
    <script src="jsdelivr.net"></script>
    <style>
        input, select, textarea { border: 1px solid #cbd5e1; padding: 0.5rem; border-radius: 0.375rem; width: 100%; font-size: 0.95rem; background-color: #ffffff; }
        input:focus, select:focus, textarea:focus { outline: 2px solid #ef4444; }
        .btn-now { background-color: #ef4444; color: white; padding: 0.5rem 0.875rem; border-radius: 0.375rem; font-weight: bold; cursor: pointer; white-space: nowrap; font-size: 0.875rem; transition: all 0.2s; }
        .btn-now:hover { background-color: #dc2626; }
        .score-box { padding: 0.75rem; border-radius: 0.5rem; text-align: center; color: white; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-6 min-h-screen text-slate-800">

    <div class="max-w-4xl mx-auto bg-white p-4 md:p-8 rounded-2xl shadow-xl border border-slate-200">
        <h1 class="text-3xl font-black text-center text-red-600 mb-8 border-b-4 border-red-500 pb-4">🩺 Sepsis ER MPH Tracking System</h1>

        <form onsubmit="event.preventDefault();" class="space-y-6">
            
            <!-- 📌 ส่วนที่ 1: ข้อมูลแรกรับและการคัดกรอง -->
            <div class="bg-blue-50/60 p-4 rounded-xl border border-blue-200 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-blue-900 mb-1">📌 HN</label>
                        <input type="text" id="hn" placeholder="ระบุ HN ......">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-blue-900 mb-1">📌 Age (ปี)</label>
                        <input type="number" id="age" placeholder="ระบุอายุ ......">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-blue-900 mb-1">📌 U/D (โรคประจำตัว)</label>
                        <input type="text" id="ud" placeholder="ระบุโรคประจำตัว ......">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-blue-900 mb-1">📌 วันที่ visit</label>
                        <div class="flex gap-2">
                            <input type="date" id="visit-date">
                            <button type="button" id="btn-today" class="bg-blue-600 text-white px-4 rounded-md font-bold text-sm cursor-pointer hover:bg-blue-700">Today</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-blue-900 mb-1">📌 Visit time</label>
                        <div class="flex gap-2">
                            <input type="time" id="visit-time">
                            <button type="button" class="btn-now" onclick="setTime('visit-time')">Now</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-blue-900 mb-1">📌 Triage level</label>
                        <div class="flex gap-2">
                            <select id="triage-level">
                                <option value="">เลือก Level 1-5</option>
                                <option value="1">Level 1</option>
                                <option value="2">Level 2</option>
                                <option value="3">Level 3</option>
                                <option value="4">Level 4</option>
                                <option value="5">Level 5</option>
                            </select>
                            <input type="time" id="triage-time" class="w-32">
                            <button type="button" class="btn-now" onclick="setTime('triage-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-blue-900 mb-1">📌 Alert Fast Track</label>
                        <div class="flex gap-2">
                            <select id="fast-track">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                            </select>
                            <input type="time" id="fast-track-time" class="w-32">
                            <button type="button" class="btn-now" onclick="setTime('fast-track-time')">Now</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 📌 ส่วนที่ 2: Vital signs แรกรับ & Scoring -->
            <div class="bg-emerald-50/60 p-4 rounded-xl border border-emerald-200 space-y-4">
                <h2 class="font-bold text-emerald-900 text-lg border-b border-emerald-200 pb-2">📌 Vital signs แรกรับ & Auto Scoring</h2>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                    <div>
                        <label class="block text-sm font-semibold mb-1">BT (°C)</label>
                        <div class="flex gap-1">
                            <input type="number" step="0.1" id="bt" placeholder="…..c">
                            <input type="time" id="bt-time" class="w-24 text-xs p-1">
                            <button type="button" class="btn-now text-xs px-2" onclick="setTime('bt-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">RR (/min)</label>
                        <div class="flex gap-1">
                            <input type="number" id="rr" placeholder="……/min">
                            <input type="time" id="rr-time" class="w-24 text-xs p-1">
                            <button type="button" class="btn-now text-xs px-2" onclick="setTime('rr-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">HR (/min)</label>
                        <div class="flex gap-1">
                            <input type="number" id="hr" placeholder="……./min">
                            <input type="time" id="hr-time" class="w-24 text-xs p-1">
                            <button type="button" class="btn-now text-xs px-2" onclick="setTime('hr-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">BP (mmHg)</label>
                        <div class="flex gap-1">
                            <input type="text" id="bp" placeholder="…….mmHg">
                            <input type="time" id="bp-time" class="w-24 text-xs p-1">
                            <button type="button" class="btn-now text-xs px-2" onclick="setTime('bp-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">SpO2 (%RA)</label>
                        <div class="flex gap-1">
                            <input type="number" id="spo2" placeholder="…..%">
                            <input type="time" id="spo2-time" class="w-24 text-xs p-1">
                            <button type="button" class="btn-now text-xs px-2" onclick="setTime('spo2-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Oxygen ทดแทน</label>
                        <div class="flex gap-1">
                            <select id="o2-use">
                                <option value="no">ไม่ใช้</option>
                                <option value="yes">ใช้</option>
                            </select>
                            <input type="time" id="o2-time" class="w-24 text-xs p-1">
                            <button type="button" class="btn-now text-xs px-2" onclick="setTime('o2-time')">Now</button>
                        </div>
                    </div>
                </div>

                <div class="pt-2">
                    <label class="block text-sm font-bold text-emerald-900 mb-1">Consciousness</label>
                    <select id="consciousness">
                        <option value="A">A (Alert)</option>
                        <option value="V">V (Voice)</option>
                        <option value="P">P (Pain)</option>
                        <option value="U">U (Unresponsive)</option>
                    </select>
                </div>

                <!-- ระบบรันผลคะแนนอัตโนมัติ -->
                <div class="grid grid-cols-3 gap-3 mt-4">
                    <div class="score-box bg-teal-600 shadow">SIRS: <span id="score-sirs">0</span></div>
                    <div class="score-box bg-cyan-600 shadow">SOS: <span id="score-sos">0</span></div>
                    <div class="score-box bg-indigo-600 shadow">NEWS2: <span id="score-news2">0</span></div>
                </div>
            </div>

            <!-- 📌 ส่วนที่ 3: การวินิจฉัยโรคและการสั่งการรักษาด่วน -->
            <div class="bg-purple-50/60 p-4 rounded-xl border border-purple-200 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-purple-900 mb-1">📌 แพทย์วินิจฉัย sepsis</label>
                        <div class="flex gap-2">
                            <input type="text" id="dx-sepsis" placeholder="ระบุคำวินิจฉัย ...">
                            <input type="time" id="dx-sepsis-time" class="w-32">
                            <button type="button" class="btn-now" onclick="setTime('dx-sepsis-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-purple-900 mb-1">🚑 Alert RRT sepsis protocol</label>
                        <div class="flex gap-2">
                            <select id="rrt-alert"><option value="No">No</option><option value="Yes">Yes</option></select>
                            <input type="time" id="rrt-time" class="w-32">
                            <button type="button" class="btn-now" onclick="setTime('rrt-time')">Now</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2 border-t border-purple-100">
                    <div>
                        <label class="block text-sm font-bold text-purple-900 mb-1">📋 DTX stat</label>
                        <div class="flex gap-2">
                            <input type="number" id="dtx" placeholder="…….mg/dL">
                            <input type="time" id="dtx-time" class="w-32">
                            <button type="button" class="btn-now" onclick="setTime('dtx-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-purple-900 mb-1">📋 Blood lactate stat</label>
                        <div class="flex gap-2">
                            <input type="number" step="0.1" id="lactate" placeholder="……mmol/L">
                            <input type="time" id="lactate-time" class="w-32">
                            <button type="button" class="btn-now" onclick="setTime('lactate-time')">Now</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-purple-900 mb-1">📋 Take Hemoculture ครั้งที่ 1</label>
                        <div class="flex gap-2">
                            <select id="hemo1"><option value="Rt">Rt</option><option value="Lt">Lt</option></select>
                            <input type="time" id="hemo1-time" class="w-32">
                            <button type="button" class="btn-now" onclick="setTime('hemo1-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-purple-900 mb-1">📋 Take Hemoculture ครั้งที่ 2</label>
                        <div class="flex gap-2">
                            <select id="hemo2"><option value="Rt">Rt</option><option value="Lt">Lt</option></select>
                            <input type="time" id="hemo2-time" class="w-32">
                            <button type="button" class="btn-now" onclick="setTime('hemo2-time')">Now</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-purple-900 mb-1">💊 Start ATB</label>
                        <div class="flex gap-2">
                            <select id="start-atb"><option value="No">No</option><option value="Yes">Yes</option></select>
                            <input type="time" id="atb-time" class="w-32">
                            <button type="button" class="btn-now" onclick="setTime('atb-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-purple-900 mb-1">📋 Investigation lab</label>
                        <div class="flex gap-2">
                            <select id="invest-lab"><option value="ไม่ส่งตรวจ">ไม่ส่งตรวจ</option><option value="ส่งตรวจ">ส่งตรวจ</option></select>
                            <input type="time" id="lab-time" class="w-32">
                            <button type="button" class="btn-now" onclick="setTime('lab-time')">Now</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 📌 ส่วนที่ 4: Investigations & หัตถการและการให้ยา/สารน้ำ -->
            <div class="bg-amber-50/60 p-4 rounded-xl border border-amber-200 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-amber-900 mb-1">📋 EKG 12 lead</label>
                        <div class="flex gap-1">
                            <select id="ekg"><option value="ปกติ">ปกติ</option><option value="ผิดปกติ">ผิดปกติ</option></select>
                            <input type="time" id="ekg-time" class="w-24 text-xs"><button type="button" class="btn-now text-xs px-1.5" onclick="setTime('ekg-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-amber-900 mb-1">📋 ส่ง CXR ผล CXR</label>
                        <div class="flex gap-1">
                            <select id="cxr-result"><option value="ปกติ">ปกติ</option><option value="ผิดปกติ">ผิดปกติ</option></select>
                            <input type="time" id="cxr-time" class="w-24 text-xs"><button type="button" class="btn-now text-xs px-1.5" onclick="setTime('cxr-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-amber-900 mb-1">📋 ส่งตรวจ UA-UC</label>
                        <div class="flex gap-1">
                            <select id="ua-uc"><option value="Midstream">Midstream</option><option value="F/C">F/C</option></select>
                            <input type="time" id="ua-uc-time" class="w-24 text-xs"><button type="button" class="btn-now text-xs px-1.5" onclick="setTime('ua-uc-time')">Now</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-amber-200 pt-3">
                    <div>
                        <label class="block text-sm font-bold text-amber-900 mb-1">📋 Start IVF</label>
                        <div class="flex gap-2">
                            <select id="ivf-type" class="w-1/3"><option value="NSS">NSS</option><option value="Acetar">Acetar</option><option value="LRS">LRS</option></select>
                            <input type="number" id="ivf-rate" placeholder="rate …..ml/hr" class="w-1/3">
                            <input type="time" id="ivf-time" class="w-24">
                            <button type="button" class="btn-now" onclick="setTime('ivf-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-amber-900 mb-1">📋 Load IVF total</label>
                        <div class="flex gap-2">
                            <input type="number" id="ivf-load" placeholder="……..ml">
                            <input type="time" id="ivf-load-time" class="w-32">
                            <button type="button" class="btn-now" onclick="setTime('ivf-load-time')">Now</button>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-3 rounded-lg border border-amber-200">
                    <label class="block text-sm font-bold text-amber-900 mb-2">💊 Start Norepinephrine</label>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-2 items-center">
                        <input type="number" id="ne-mg" placeholder="…….mg" class="text-sm">
                        <input type="number" id="ne-5dw" placeholder="5DW……… ml" class="text-sm">
                        <select id="ne-conc" class="text-sm"><option value="(4:100)">(4:100)</option><option value="(4:250)">(4:250)</option></select>
                        <select id="ne-site" class="text-sm"><option value="Lt">Lt</option><option value="Rt">Rt</option></select>
                        <div class="flex gap-1 col-span-2 md:col-span-1">
                            <input type="time" id="ne-time" class="w-full text-sm">
                            <button type="button" class="btn-now text-xs px-2" onclick="setTime('ne-time')">Now</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-amber-900 mb-1">📋 IVC assess</label>
                        <div class="flex gap-1 items-center">
                            <input type="number" id="ivc-di" placeholder="DI = …%" class="w-1/2">
                            <input type="number" id="ivc-ci" placeholder="CI = …%" class="w-1/2">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-amber-900 mb-1">📌 Monitor V/S q 5-15 + Monitor EKG</label>
                        <div class="flex gap-2">
                            <select id="monitor-vs"><option value="No">No</option><option value="Yes">Yes</option></select>
                            <input type="time" id="monitor-time" class="w-24">
                            <button type="button" class="btn-now" onclick="setTime('monitor-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-amber-900 mb-1">📋 Give Oxygen</label>
                        <div class="flex gap-1">
                            <select id="o2-give-type" class="text-xs"><option value="cannula">cannula</option><option value="Mask with bag">Mask with bag</option><option value="ETT">ETT</option></select>
                            <input type="text" id="o2-lpm" placeholder="…….LPM" class="w-20 text-xs">
                            <input type="time" id="o2-give-time" class="w-20 text-xs">
                            <button type="button" class="btn-now text-xs px-1.5" onclick="setTime('o2-give-time')">Now</button>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-3 rounded-lg border border-amber-200">
                    <label class="block text-sm font-bold text-amber-900 mb-2">📌 Intubation ET tube</label>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        <input type="text" id="ett-no" placeholder="No. ……">
                        <input type="number" id="ett-attempt" placeholder="Attempt ……">
                        <input type="number" id="ett-depth" placeholder="Depth …….cm">
                        <div class="flex gap-1">
                            <input type="time" id="ett-time" class="w-full">
                            <button type="button" class="btn-now text-xs px-2" onclick="setTime('ett-time')">Now</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 📌 ส่วนที่ 5: ระบบบันทึกข้อความ (Note) แบบเคลียร์ค่าอัตโนมัติ -->
            <div class="bg-rose-50 p-4 rounded-xl border border-rose-200 space-y-3">
                <h2 class="font-bold text-rose-900 text-lg">📚 ช่องกด note + บันทึกและเคลียร์ข้อความอัตโนมัติ</h2>
                <div class="flex gap-2">
                    <textarea id="note-text" rows="2" placeholder="ระบุข้อความโน้ตตรงนี้..." class="bg-white"></textarea>
                    <div class="flex flex-col gap-1 justify-center">
                        <input type="time" id="note-time" class="w-28 text-xs">
                        <button type="button" class="btn-now text-xs py-1.5" onclick="setTime('note-time')">Now</button>
                    </div>
                </div>
                <button type="button" id="btn-save-note" class="w-full bg-rose-600 text-white font-bold py-2.5 rounded-lg hover:bg-rose-700 transition cursor-pointer shadow">💾 บันทึกข้อความและขึ้นโน้ตใหม่</button>
                
                <!-- กล่องแสดงรายการโน้ตย้อนหลัง -->
                <div id="note-logs" class="space-y-1.5 max-h-48 overflow-y-auto pt-2"></div>
            </div>

            <!-- 📌 ส่วนที่ 6: การปรึกษาและสรุปขั้นสุดท้าย -->
            <div class="bg-slate-100 p-4 rounded-xl border border-slate-300 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-900 mb-1">📌 Consult specialist</label>
                        <div class="flex gap-2">
                            <select id="consult-spec"><option value="No">No</option><option value="Yes">Yes</option></select>
                            <input type="time" id="consult-time" class="w-32">
                            <button type="button" class="btn-now" onclick="setTime('consult-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-900 mb-1">💉 Definitive diagnosis</label>
                        <input type="text" id="definitive-dx" placeholder="ระบุผลวินิจฉัยสุดท้าย ......">
                    </div>
                </div>
            </div>

        </form>
    </div>

    <!-- ==================== JavaScript Engine ควบคุมหน้าเว็บทั้งหมด ==================== -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. ปุ่ม Today ของวันที่ปัจจุบัน
            document.getElementById("btn-today").addEventListener("click", () => {
                document.getElementById("visit-date").value = new Date().toISOString().split('T')[0];
            });

            // 2. ฟังก์ชันส่วนกลางสำหรับปุ่ม NOW บันทึกเวลาทันที
            window.setTime = function(elementId) {
                const now = new Date();
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                document.getElementById(elementId).value = `${hh}:${mm}`;
                
                // สั่งประมวลผลคะแนนใหม่ทันทีหากมีการบันทึกเวลาของกลุ่มสัญญาณชีพ
                if (['bt-time', 'rr-time', 'hr-time', 'bp-time', 'spo2-time', 'o2-time'].includes(elementId)) {
                    runAutoScoring();
                }
            };

            // 3. ระบบคำนวณคะแนนอัตโนมัติ (SIRS, SOS, NEWS2)
            const vitalInputs = ['bt', 'rr', 'hr', 'bp', 'spo2', 'o2-use', 'consciousness'];
            vitalInputs.forEach(id => {
                document.getElementById(id).addEventListener("input", runAutoScoring);
            });

            function runAutoScoring() {
                const bt = parseFloat(document.getElementById("bt").value) || 0;
                const rr = parseInt(document.getElementById("rr").value) || 0;
                const hr = parseInt(document.getElementById("hr").value) || 0;
                const bpVal = document.getElementById("bp").value;
                const sbp = parseInt(bpVal.split('/')[0]) || 0; 
                const spo2 = parseInt(document.getElementById("spo2").value) || 0;
                const o2Use = document.getElementById("o2-use").value;
                const cons = document.getElementById("consciousness").value;

                document.getElementById("score-sirs").textContent = calculateSIRS(bt, rr, hr);
                document.getElementById("score-sos").textContent = calculateSOS(bt, rr, hr, sbp, cons);
                document.getElementById("score-news2").textContent = calculateNEWS2(bt, rr, hr, sbp, spo2, o2Use, cons);
            }

            function calculateSIRS(bt, rr, hr) {
                if (!bt && !rr && !hr) return 0;
                let s = 0;
                if (bt > 38.0 || bt < 36.0) s++;
                if (hr > 90) s++;
                if (rr > 20) s++;
                return s;
            }

            function calculateSOS(bt, rr, hr, sbp, cons) {
                if (!bt && !rr && !hr && !sbp) return 0;
                let s = 0;
                if (bt <= 35.0) s += 3; else if (bt >= 38.5) s += 1;
                if (hr >= 130) s += 3; else if (hr >= 111 || hr <= 40) s += 2; else if (hr >= 101 || hr <= 50) s += 1;
                if (rr >= 30) s += 3; else if (rr >= 25) s += 2; else if (rr >= 21 || rr <= 8) s += 1;
                if (sbp > 0 && sbp <= 80) s += 3; else if (sbp <= 90) s += 2; else if (sbp <= 100) s += 1;
                if (['V', 'P', 'U'].includes(cons)) s += 3;
                return s;
            }

            function calculateNEWS2(bt, rr, hr, sbp, spo2, o2, cons) {
                if (!bt && !rr && !hr && !sbp && !spo2) return 0;
                let s = 0;
                if (rr >= 25) s += 3; else if (rr >= 21 || rr <= 8) s += 2; else if (rr >= 9 && rr <= 11) s += 1;
                if (spo2 > 0 && spo2 <= 91) s += 3; else if (spo2 <= 93) s += 2; else if (spo2 <= 95) s += 1;
                if (o2 === "yes") s += 2;
                if (sbp > 0 && (sbp >= 220 || sbp <= 90)) s += 3; else if (sbp <= 100) s += 2; else if (sbp <= 110) s += 1;
                if (hr >= 131 || hr <= 40) s += 3; else if (hr >= 111) s += 2; else if (hr >= 91 || hr <= 50) s += 1;
                if (bt <= 35.0) s += 3; else if (bt >= 39.1) s += 2; else if (bt >= 38.1 || bt <= 36.0) s += 1;
                if (['V', 'P', 'U'].includes(cons)) s += 3;
                return s;
            }

            // 4. ระบบการบันทึกช่อง Note และเคลียร์ข้อความเดิมแบบอัตโนมัติ
            const btnSaveNote = document.getElementById("btn-save-note");
            const noteText = document.getElementById("note-text");
            const noteTime = document.getElementById("note-time");
            const noteLogs = document.getElementById("note-logs");

            btnSaveNote.addEventListener("click", () => {
                const text = noteText.value.trim();
                const time = noteTime.value;

                if (!text || !time) {
                    alert("กรุณากรอกข้อความในช่องโน้ตและกดบันทึกเวลาก่อนครับ");
                    return;
                }

                // สร้างแถบบันทึกประวัติโน้ตใหม่
                const logBox = document.createElement("div");
                logBox.className = "bg-slate-200/80 px-3 py-2 rounded-md flex justify-between items-center text-sm border-l-4 border-rose-500 font-medium animate-fade-in";
                logBox.innerHTML = `<span>🕒 [${time}] - ${text}</span><button class="text-red-500 font-black px-1" onclick="this.parentElement.remove()">✕</button>`;
                
                noteLogs.appendChild(logBox);
                
                // 🔄 ทำการเคลียร์ข้อความเดิมทันทีตามสั่งเพื่อเริ่มบันทึกข้อความใหม่ต่อไป
                noteText.value = "";
                noteTime.value = "";
            });
        });
    </script>
</body>
</html>
