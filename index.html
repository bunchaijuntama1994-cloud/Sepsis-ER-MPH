<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepsis Fast Track - Muangpan Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; padding-bottom: 50px; }
        .card { border-radius: 15px; border: none; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-banner { background: linear-gradient(135deg, #0d6efd 0%, #0043a8 100%); color: white; padding: 25px; text-align: center; border-radius: 0 0 25px 25px; margin-bottom: 20px; }
        label { font-weight: bold; margin-bottom: 5px; color: #444; }
    </style>
</head>
<body>
    <div class="header-banner shadow">
        <h3>Sepsis Fast Track Record</h3>
        <p class="mb-0">Muangpan Hospital • Full Corrected System</p>
    </div>

    <div class="container">
        <!-- Arrival & Triage -->
        <div class="card">
            <div class="card-header bg-primary text-white fw-bold">🏥 Arrival & Triage</div>
            <div class="card-body">
                <label>Visit ER (StartTime)</label>
                <input type="time" id="startTime" class="form-control mb-3">
                
                <label>Level of Triage</label>
                <select id="triageLevel" class="form-select mb-3">
                    <option value="Level 1">Level 1 (Resuscitation)</option>
                    <option value="Level 2">Level 2 (Emergency)</option>
                    <option value="Level 3">Level 3 (Urgent)</option>
                </select>
            </div>
        </div>

        <!-- Vital Signs (ตามภาพ image_35.png) -->
        <div class="card">
            <div class="card-header bg-warning text-dark fw-bold">🌡️ Vital Signs & NEWS2</div>
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-4"><label>T</label><input type="text" id="temp" class="form-control" placeholder="37"></div>
                    <div class="col-4"><label>PR</label><input type="text" id="pr" class="form-control" placeholder="80"></div>
                    <div class="col-4"><label>RR</label><input type="text" id="rr" class="form-control" placeholder="20"></div>
                    <div class="col-6"><label>BP</label><input type="text" id="bp" class="form-control" placeholder="120/80"></div>
                    <div class="col-6"><label>O2 Sat</label><input type="text" id="sat" class="form-control" placeholder="98"></div>
                </div>
            </div>
        </div>

        <!-- Labs & X-ray (ตามภาพ image_35.png) -->
        <div class="card">
            <div class="card-header bg-info text-white fw-bold">🔬 Investigation & Lab</div>
            <div class="card-body">
                <label>Lab Investigation</label>
                <select id="labStatus" class="form-select mb-2"><option value="ไม่ได้ส่ง">ไม่ได้ส่ง</option><option value="ส่งตรวจ">ส่งตรวจ</option></select>
                <input type="text" id="labResult" class="form-control mb-2" placeholder="ผลปกติ/ผิดปกติ">
                <input type="time" id="labTime" class="form-control mb-3">

                <label>UA / UC</label>
                <select id="uaStatus" class="form-select mb-2"><option value="ไม่ได้ส่ง">ไม่ได้ส่ง</option><option value="ส่งตรวจ">ส่งตรวจ</option></select>
                <input type="text" id="uaResult" class="form-control mb-2" placeholder="ผล UA/UC">
                <input type="time" id="uaTime" class="form-control mb-3">

                <label>CXR (Chest X-ray)</label>
                <select id="cxrResult" class="form-select mb-2"><option value="ไม่ได้ส่ง">ไม่ได้ส่ง</option><option value="ปกติ">ปกติ</option><option value="ผิดปกติ">ผิดปกติ</option></select>
                <input type="time" id="cxrTime" class="form-control">
            </div>
        </div>

        <button onclick="copyFullReport()" class="btn btn-success w-100 py-3 fw-bold shadow-lg">📋 Copy สรุปรายงานฉบับสมบูรณ์</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
