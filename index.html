<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepsis ER MPH</title>
    <!-- ใช้ Tailwind CSS สำหรับตกแต่งหน้าตาให้สวยงามและรองรับมือถือ -->
    <script src="jsdelivr.net"></script>
    <style>
        input, select, textarea { border: 1px solid #cbd5e1; padding: 0.375rem 0.75rem; border-radius: 0.375rem; width: 100%; }
        input:focus, select:focus, textarea:focus { outline: 2px solid #3b82f6; }
        .now-btn { background-color: #ef4444; color: white; padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-weight: bold; cursor: pointer; font-size: 0.875rem; }
        .now-btn:hover { background-color: #dc2626; }
    </style>
</head>
<body class="bg-slate-100 p-4 min-h-screen">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold text-center text-red-600 mb-6">🩺 Sepsis ER MPH</h1>

        <form id="sepsis-form" onsubmit="event.preventDefault();">
            
            <!-- ส่วนที่ 1: ข้อมูลผู้ป่วยพื้นฐาน -->
            <div class="bg-blue-50 p-4 rounded-lg mb-4">
                <h2 class="font-bold text-blue-900 mb-3">📌 ข้อมูลแรกรับและการคัดกรอง</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">HN</label>
                        <input type="text" id="hn" placeholder="ระบุ HN">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Age (ปี)</label>
                        <input type="number" id="age" placeholder="ระบุอายุ">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">U/D (โรคประจำตัว)</label>
                        <input type="text" id="ud" placeholder="ระบุโรคประจำตัว">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
                    <div>
                        <label class="block text-sm font-semibold mb-1">วันที่ visit</label>
                        <div class="flex gap-2">
                            <input type="date" id="visit-date">
                            <button type="button" id="btn-today" class="bg-blue-600 text-white px-3 rounded-md font-bold text-sm">Today</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Visit time</label>
                        <div class="flex gap-2">
                            <input type="time" id="visit-time">
                            <button type="button" class="now-btn" onclick="setCurrentTime('visit-time')">Now</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Triage level (1-5)</label>
                        <div class="flex gap-2">
                            <select id="triage-level">
                                <option value="">-- เลือก Level --</option>
                                <option value="1">Level 1</option>
                                <option value="2">Level 2</option>
                                <option value="3">Level 3</option>
                                <option value="4">Level 4</option>
                                <option value="5">Level 5</option>
                            </select>
                            <input type="time" id="triage-time" class="w-32">
                            <button type="button" class="now-btn" onclick="setCurrentTime('triage-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Alert Fast Track</label>
                        <div class="flex gap-2">
                            <select id="fast-track">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                            </select>
                            <input type="time" id="fast-track-time" class="w-32">
                            <button type="button" class="now-btn" onclick="setCurrentTime('fast-track-time')">Now</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ส่วนที่ 2: Vital Signs & การคำนวณคะแนน -->
            <div class="bg-emerald-50 p-4 rounded-lg mb-4">
                <h2 class="font-bold text-emerald-900 mb-3">📌 Vital signs แรกรับ & Scoring</h2>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <div>
                        <label class="block text-sm font-semibold mb-1">BT (°C)</label>
                        <div class="flex gap-1"><input type="number" step="0.1" id="bt"><input type="time" id="bt-time" class="w-24 text-xs"><button type="button" class="now-btn text-xs px-1.5" onclick="setCurrentTime('bt-time')">Now</button></div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">RR (/min)</label>
                        <div class="flex gap-1"><input type="number" id="rr"><input type="time" id="rr-time" class="w-24 text-xs"><button type="button" class="now-btn text-xs px-1.5" onclick="setCurrentTime('rr-time')">Now</button></div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">HR (/min)</label>
                        <div class="flex gap-1"><input type="number" id="hr"><input type="time" id="hr-time" class="w-24 text-xs"><button type="button" class="now-btn text-xs px-1.5" onclick="setCurrentTime('hr-time')">Now</button></div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">BP (mmHg)</label>
                        <div class="flex gap-1"><input type="text" id="bp" placeholder="เช่น 120/80"><input type="time" id="bp-time" class="w-24 text-xs"><button type="button" class="now-btn text-xs px-1.5" onclick="setCurrentTime('bp-time')">Now</button></div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">SpO2 (%RA)</label>
                        <div class="flex gap-1"><input type="number" id="spo2"><input type="time" id="spo2-time" class="w-24 text-xs"><button type="button" class="now-btn text-xs px-1.5" onclick="setCurrentTime('spo2-time')">Now</button></div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Oxygen ทดแทน</label>
                        <div class="flex gap-1">
                            <select id="o2-use"><option value="no">ไม่ใช้</option><option value="yes">ใช้</option></select>
                            <input type="time" id="o2-time" class="w-24 text-xs"><button type="button" class="now-btn text-xs px-1.5" onclick="setCurrentTime('o2-time')">Now</button>
                        </div>
                    </div>
                </div>
                
                <div class="mt-3">
                    <label class="block text-sm font-semibold mb-1">Consciousness</label>
                    <select id="consciousness">
                        <option value="A">A (Alert)</option>
                        <option value="V">V (Voice)</option>
                        <option value="P">P (Pain)</option>
                        <option value="U">U (Unresponsive)</option>
                    </select>
                </div>

                <!-- โซนแสดงคะแนนอัตโนมัติ -->
                <div class="grid grid-cols-3 gap-2 mt-4 text-center text-white font-bold">
                    <div class="bg-teal-600 p-2 rounded">SIRS: <span id="score-sirs">0</span></div>
                    <div class="bg-cyan-600 p-2 rounded">SOS: <span id="score-sos">0</span></div>
                    <div class="bg-indigo-600 p-2 rounded">NEWS2: <span id="score-news2">0</span></div>
                </div>
            </div>

            <!-- ส่วนที่ 3: การวินิจฉัยและการจัดการขั้นต้น -->
            <div class="bg-purple-50 p-4 rounded-lg mb-4">
                <h2 class="font-bold text-purple-900 mb-3">📌 แพทย์วินิจฉัย & การส่งตรวจทางห้องปฏิบัติการ</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">แพทย์วินิจฉัย sepsis</label>
                        <div class="flex gap-2">
                            <input type="text" id="dx-sepsis-detail" placeholder="ระบุรายละเอียด">
                            <input type="time" id="dx-sepsis-time" class="w-32">
                            <button type="button" class="now-btn" onclick="setCurrentTime('dx-sepsis-time')">Now</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">🚑 Alert RRT sepsis protocol</label>
                        <div class="flex gap-2">
                            <select id="rrt-alert"><option value="No">No</option><option value="Yes">Yes</option></select>
                            <input type="time" id="rrt-time" class="w-32">
                            <button type="button" class="now-btn" onclick="setCurrentTime('rrt-time')">Now</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
                    <div>
                        <label class="block text-sm font-semibold mb-1">DTX sta
